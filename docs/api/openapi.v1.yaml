openapi: 3.1.0
info:
  title: X-Claw API
  version: 1.0.0
  description: Canonical MVP API contract for X-Claw Slice 02 freeze.
servers:
  - url: https://xclaw.trade
paths:
  /api/health:
    get:
      summary: Public liveness/readiness status for API, DB, and Redis.
      responses:
        '200':
          description: Health snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /api/status:
    get:
      summary: Public-safe diagnostics with dependency, provider, and incident visibility.
      responses:
        '200':
          description: Public diagnostics status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/health:
    get:
      summary: Compatibility alias for /api/health.
      responses:
        '200':
          description: Health snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/status:
    get:
      summary: Compatibility alias for /api/status.
      responses:
        '200':
          description: Public diagnostics status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/register:
    post:
      summary: Register or upsert agent identity and wallets.
      security:
        - agentBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRegisterRequest'
      responses:
        '200':
          description: Agent registered.
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/heartbeat:
    post:
      summary: Submit runtime heartbeat and policy snapshot.
      security:
        - agentBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentHeartbeatRequest'
      responses:
        '200':
          description: Heartbeat accepted.
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/management-link:
    post:
      summary: Issue a short-lived owner management URL for this authenticated agent.
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentManagementLinkRequest'
      responses:
        '200':
          description: One-time owner management URL issued.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/transfers/policy:
    get:
      summary: Read effective outbound transfer policy and trade-cap policy for authenticated agent.
      security:
        - agentBearer: []
      parameters:
        - name: chainKey
          in: query
          required: false
          schema:
            type: string
            default: base_sepolia
      responses:
        '200':
          description: Outbound transfer policy payload including chain access, effective trade caps, and UTC-day usage.
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/transfer-policy:
    get:
      summary: Read runtime-mirrored transfer approval policy for authenticated agent.
      security:
        - agentBearer: []
      parameters:
        - name: chainKey
          in: query
          required: false
          schema:
            type: string
            default: base_sepolia
      responses:
        '200':
          description: Transfer approval policy payload.
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/transfer-policy/mirror:
    post:
      summary: Mirror runtime transfer approval policy into server read model (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentTransferPolicyMirrorRequest'
      responses:
        '200':
          description: Transfer policy mirror accepted.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/transfer-approvals/mirror:
    post:
      summary: Mirror runtime transfer approval lifecycle into server read model (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentTransferApprovalsMirrorRequest'
      responses:
        '200':
          description: Transfer approval mirror accepted.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/x402/outbound/proposed:
    post:
      summary: Mirror runtime-proposed outbound x402 payment intent (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentX402OutboundProposedRequest'
      responses:
        '200':
          description: x402 outbound proposed row accepted.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/x402/outbound/mirror:
    post:
      summary: Mirror runtime lifecycle updates for outbound x402 payments (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentX402OutboundMirrorRequest'
      responses:
        '200':
          description: x402 outbound mirror update accepted.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/x402/inbound/mirror:
    post:
      summary: Mirror inbound hosted x402 lifecycle into server read model (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentX402InboundMirrorRequest'
      responses:
        '200':
          description: x402 inbound mirror update accepted.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/x402/inbound/proposed:
    post:
      summary: Create a hosted x402 inbound receive request URL (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentX402InboundProposedRequest'
      responses:
        '200':
          description: x402 inbound receive request created.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/trade-usage:
    post:
      summary: Report UTC-day trade usage deltas for authenticated agent (idempotent).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentTradeUsageRequest'
      responses:
        '200':
          description: Usage delta accepted and aggregated.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/trade/uniswap/quote:
    post:
      summary: Request Uniswap quote via server-side proxy (agent-auth).
      description: Uses server-held `XCLAW_UNISWAP_API_KEY`; runtime never sends Uniswap API keys.
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniswapQuoteRequest'
      responses:
        '200':
          description: Uniswap quote resolved.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/trade/uniswap/build:
    post:
      summary: Build Uniswap approval/swap transactions via server-side proxy (agent-auth).
      description: Returns executable tx payload(s) for runtime signing and submission.
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniswapBuildRequest'
      responses:
        '200':
          description: Uniswap tx payload(s) returned.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/liquidity/uniswap/approve:
    post:
      summary: Build Uniswap LP approval transactions via server-side proxy (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniswapLpApproveRequest'
      responses:
        '200':
          description: Uniswap LP approval transaction payload(s) returned.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/liquidity/uniswap/create:
    post:
      summary: Build Uniswap LP create-position transactions via server-side proxy (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniswapLpCreateRequest'
      responses:
        '200':
          description: Uniswap LP create transaction payload(s) returned.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/liquidity/uniswap/increase:
    post:
      summary: Build Uniswap LP increase-position transactions via server-side proxy (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniswapLpIncreaseRequest'
      responses:
        '200':
          description: Uniswap LP increase transaction payload(s) returned.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/liquidity/uniswap/decrease:
    post:
      summary: Build Uniswap LP decrease-position transactions via server-side proxy (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniswapLpDecreaseRequest'
      responses:
        '200':
          description: Uniswap LP decrease transaction payload(s) returned.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/liquidity/uniswap/claim-fees:
    post:
      summary: Build Uniswap LP claim-fees transactions via server-side proxy (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniswapLpClaimFeesRequest'
      responses:
        '200':
          description: Uniswap LP claim-fees transaction payload(s) returned.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/liquidity/uniswap/migrate:
    post:
      summary: Build Uniswap LP migrate transactions via server-side proxy (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniswapLpMigrateRequest'
      responses:
        '200':
          description: Uniswap LP migrate transaction payload(s) returned.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/liquidity/uniswap/claim-rewards:
    post:
      summary: Build Uniswap LP claim-rewards transactions via server-side proxy (agent-auth).
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniswapLpClaimRewardsRequest'
      responses:
        '200':
          description: Uniswap LP claim-rewards transaction payload(s) returned.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/approvals/prompt:
    post:
      summary: Report approval prompt metadata for authenticated agent (idempotent).
      description: Stores delivery metadata for cross-surface cleanup/sync only. Does not authorize approvals.
      security:
        - agentBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentApprovalsPromptRequest'
      responses:
        '200':
          description: Prompt metadata accepted.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/policy-approvals/proposed:
    post:
      summary: Propose a policy approval request for authenticated agent (idempotent).
      description: Creates an `approval_pending` request for token preapproval or enabling Approve all.
      security:
        - agentBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentPolicyApprovalProposedRequest'
      responses:
        '200':
          description: Policy approval request created.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/policy-approvals/{policyApprovalId}/decision:
    post:
      summary: Decide one pending policy approval request (agent-auth; Telegram callback).
      description: Approves/rejects a policy approval request and applies the policy change when approved.
      security:
        - agentBearer: []
      parameters:
        - name: policyApprovalId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyApprovalDecisionRequest'
      responses:
        '200':
          description: Decision accepted.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/faucet/request:
    post:
      summary: Request faucet drip assets for authenticated agent wallet on supported testnet chains.
      security:
        - agentBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentFaucetRequest'
      responses:
        '200':
          description: Faucet transfer submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentFaucetResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/faucet/networks:
    get:
      summary: List supported faucet networks/assets for authenticated agent.
      security:
        - agentBearer: []
      responses:
        '200':
          description: Faucet capability map returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentFaucetNetworksResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/bootstrap:
    post:
      summary: One-shot signed bootstrap that creates or reuses agent identity and returns signed API token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentBootstrapRequest'
      responses:
        '200':
          description: Bootstrap succeeded with issued credentials.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/bootstrap/challenge:
    post:
      summary: Issue a canonical wallet-signing challenge for signed bootstrap.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentBootstrapChallengeRequest'
      responses:
        '200':
          description: Challenge issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentBootstrapChallengeResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/auth/challenge:
    post:
      summary: Issue a canonical wallet-signing challenge for agent API key recovery.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentAuthChallengeRequest'
      responses:
        '200':
          description: Challenge issued.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/agent/auth/recover:
    post:
      summary: Verify signed challenge and issue a fresh agent API key.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentAuthRecoverRequest'
      responses:
        '200':
          description: Agent API key recovered.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
        '503':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/trades/proposed:
    post:
      summary: Ingest proposed trade and return normalized trade ID.
      security:
        - agentBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeProposedRequest'
      responses:
        '200':
          description: Proposed trade accepted. Initial status is `approved` or `approval_pending` based on owner policy (global approval or tokenIn preapproval).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, tradeId, status]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  tradeId:
                    type: string
                  status:
                    type: string
                    enum: [approved, approval_pending, proposed]
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/trades/pending:
    get:
      summary: List actionable trade intents for one authenticated agent and chain.
      security:
        - agentBearer: []
      parameters:
        - name: chainKey
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Pending actionable trades.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/liquidity/proposed:
    post:
      summary: Ingest proposed liquidity action and return normalized liquidity intent ID.
      security:
        - agentBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiquidityProposedRequest'
      responses:
        '200':
          description: Proposed liquidity intent accepted.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [ok, liquidityIntentId, status]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  liquidityIntentId:
                    type: string
                  status:
                    type: string
                    enum: [approved, approval_pending]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/liquidity/pending:
    get:
      summary: List actionable liquidity intents for one authenticated agent and chain.
      security:
        - agentBearer: []
      parameters:
        - name: chainKey
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Pending actionable liquidity intents.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/liquidity/positions:
    get:
      summary: List persisted liquidity positions for one authenticated agent and chain.
      security:
        - agentBearer: []
      parameters:
        - name: agentId
          in: query
          required: false
          schema:
            type: string
        - name: chainKey
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Liquidity positions.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/liquidity/{intentId}/status:
    post:
      summary: Submit liquidity status transition and execution metadata.
      security:
        - agentBearer: []
      parameters:
        - name: intentId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiquidityStatusUpdate'
      responses:
        '200':
          description: Liquidity status transition accepted.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /api/v1/limit-orders:
    post:
      summary: Create an agent-owned limit order.
      security:
        - agentBearer: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentLimitOrderCreateRequest'
      responses:
