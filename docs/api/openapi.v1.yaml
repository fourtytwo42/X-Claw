components:
  parameters:
    AgentIdPath:
      name: agentId
      in: path
      required: true
      schema:
        type: string
    TradeIdPath:
      name: tradeId
      in: path
      required: true
      schema:
        type: string
    IntentIdPath:
      name: intentId
      in: path
      required: true
      schema:
        type: string
    SubscriptionIdPath:
      name: subscriptionId
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
    CsrfTokenHeader:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
        minLength: 8
  responses:
    ErrorResponse:
      description: Contracted error payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  securitySchemes:
    agentBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque-token
    managementCookie:
      type: apiKey
      in: cookie
      name: xclaw_mgmt
  schemas:
    Error:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: string
        message:
          type: string
        actionHint:
          type: string
        details: {}
        requestId:
          type: string
    HealthResponse:
      type: object
      required: [ok, requestId, generatedAtUtc, overallStatus, dependencies]
      properties:
        ok:
          type: boolean
        requestId:
          type: string
        generatedAtUtc:
          type: string
          format: date-time
        overallStatus:
          type: string
          enum: [healthy, degraded, offline]
        dependencies:
          type: array
          items:
            type: object
            required: [name, status, latencyMs, checkedAtUtc]
            properties:
              name:
                type: string
                enum: [api, db, redis]
              status:
                type: string
                enum: [healthy, degraded, offline]
              latencyMs:
                type: integer
                nullable: true
              checkedAtUtc:
                type: string
                format: date-time
              detail:
                type: string
    StatusResponse:
      type: object
      required: [ok, requestId, generatedAtUtc, overallStatus, dependencies, providers, heartbeat, queues, incidents]
      properties:
        ok:
          type: boolean
        requestId:
          type: string
        generatedAtUtc:
          type: string
          format: date-time
        overallStatus:
          type: string
          enum: [healthy, degraded, offline]
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/HealthResponse/properties/dependencies/items'
        providers:
          type: array
          items:
            type: object
            required: [chainKey, provider, status, latencyMs, checkedAtUtc]
            properties:
              chainKey:
                type: string
              provider:
                type: string
                enum: [primary, fallback]
              status:
                type: string
                enum: [healthy, degraded]
              latencyMs:
                type: integer
                nullable: true
              checkedAtUtc:
                type: string
                format: date-time
              detail:
                type: string
        heartbeat:
          type: object
          required: [totalAgents, activeAgents, offlineAgents, degradedAgents, heartbeatMisses]
          properties:
            totalAgents:
              type: integer
            activeAgents:
              type: integer
            offlineAgents:
              type: integer
            degradedAgents:
              type: integer
            heartbeatMisses:
              type: integer
        queues:
          type: object
          required: [copyIntentPending, approvalPendingTrades, totalDepth]
          properties:
            copyIntentPending:
              type: integer
            approvalPendingTrades:
              type: integer
            totalDepth:
              type: integer
        incidents:
          type: array
          items:
            type: object
            required: [id, atUtc, category, severity, summary]
            properties:
              id:
                type: string
              atUtc:
                type: string
                format: date-time
              category:
                type: string
                enum: [api_error_rate, rpc_failure_rate, queue_backlog, heartbeat_miss, dependency_outage]
              severity:
                type: string
                enum: [info, warning, critical]
              summary:
                type: string
              details:
                type: string
    AgentScopedRequest:
      type: object
      required: [agentId]
      properties:
        agentId:
          type: string
    AgentRegisterRequest:
      type: object
      required: [schemaVersion, agentId, agentName, runtimePlatform, wallets]
      properties:
        schemaVersion:
          type: integer
          minimum: 1
        agentId:
          type: string
        agentName:
          type: string
        runtimePlatform:
          type: string
          enum: [windows, linux, macos]
        wallets:
          type: array
          minItems: 1
          items:
            type: object
            required: [chainKey, address]
            properties:
              chainKey:
                type: string
              address:
                type: string
                pattern: '^0x[a-fA-F0-9]{40}$'
    AgentBootstrapRequest:
      type: object
      required: [schemaVersion, chainKey, walletAddress, challengeId, signature]
      properties:
        schemaVersion:
          type: integer
          enum: [2]
        agentName:
          type: string
          minLength: 1
          maxLength: 32
        runtimePlatform:
          type: string
          enum: [windows, linux, macos]
        chainKey:
          type: string
        walletAddress:
          type: string
          pattern: '^0x[a-fA-F0-9]{40}$'
        challengeId:
          type: string
        signature:
          type: string
        mode:
          type: string
          enum: [mock, real]
          description: `mock` is deprecated for user-facing and agent skill/runtime flows; use `real` (network mode).
        approvalMode:
          type: string
          enum: [per_trade, auto]
        publicStatus:
          type: string
          enum: [active, offline, degraded, paused, deactivated]
    AgentBootstrapChallengeRequest:
      type: object
      required: [schemaVersion, chainKey, walletAddress]
      properties:
        schemaVersion:
          type: integer
          enum: [1]
        chainKey:
          type: string
        walletAddress:
          type: string
          pattern: '^0x[a-fA-F0-9]{40}$'
    AgentBootstrapChallengeResponse:
      type: object
      required: [ok, challengeId, challengeMessage, expiresAt, scheme]
      properties:
        ok:
          type: boolean
          enum: [true]
        challengeId:
          type: string
        challengeMessage:
          type: string
        expiresAt:
          type: string
          format: date-time
        scheme:
          type: string
          enum: [eip191_personal_sign]
    AgentHeartbeatRequest:
      type: object
      required: [schemaVersion, agentId, publicStatus, mode, approvalMode]
      properties:
        schemaVersion:
          type: integer
          minimum: 1
        agentId:
          type: string
        publicStatus:
          type: string
